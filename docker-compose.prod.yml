services:
  db:
    image: postgres:16-alpine
    container_name: referee-scheduler-db-prod
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - backend
    # Do not expose port to host in production

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: referee-scheduler-backend-prod
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?sslmode=disable
      PORT: 8080
      SESSION_SECRET: ${SESSION_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URL: ${GOOGLE_REDIRECT_URL}
      FRONTEND_URL: ${FRONTEND_URL}
      ENV: production
    depends_on:
      db:
        condition: service_healthy
    restart: always
    networks:
      - backend
      - frontend
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ref-sched-backend.rule=Host(`${DOMAIN}`) && PathPrefix(`/api`)"
      - "traefik.http.routers.ref-sched-backend.entrypoints=websecure"
      - "traefik.http.services.ref-sched-backend.loadbalancer.server.port=8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_URL: ${VITE_API_URL}
    container_name: referee-scheduler-frontend-prod
    restart: always
    networks:
      - frontend
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ref-sched-frontend.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.ref-sched-frontend.entrypoints=websecure"
      - "traefik.http.services.ref-sched-frontend.loadbalancer.server.port=3000"

volumes:
  postgres_data:

networks:
  backend:
    external: true
  frontend:
    external: true